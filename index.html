  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.__bpUpdateAvailable = false;
        window.__bpApplyUpdate = () => {}; // replaced once a registration exists

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            const notify = () => {
              window.__bpUpdateAvailable = true;
              window.dispatchEvent(new Event('bp:update-available'));
            };

            window.__bpApplyUpdate = () => { if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING'); };

            // A version was already downloaded and is just sitting there waiting
            if (reg.waiting) notify();

            // A new version starts downloading — watch it until it's ready
            reg.addEventListener('updatefound', () => {
              const nw = reg.installing;
              if (!nw) return;
              nw.addEventListener('statechange', () => {
                // "installed" + an existing controller = this is an update,
                // not the very first install
                if (nw.state === 'installed' && navigator.serviceWorker.controller) notify();
              });
            });

            // Check for a new sw.js right away instead of waiting for the
            // browser's own (up to 24hr) background check interval
            reg.update();
            // ...and again every time the app is reopened / foregrounded
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') reg.update();
            });
          });
        });

        // Reload once the approved update actually takes control
        let refreshed = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshed) return;
          refreshed = true;
          window.location.reload();
        });
      }
    </script>
  </body>
